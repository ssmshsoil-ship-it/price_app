<head>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>거래처 단가 조회 | sh-ai-model</title>
<style>
:root {
  --bg: #f4f6f4;
  --surface: #ffffff;
  --surface2: #f0f4f1;
  --border: #e2e8e3;
  --border2: #cdd6ce;
  --text: #1a2e1e;
  --text2: #5a6e5e;
  --text3: #94a897;
  --accent: #1a3d2b;
  --accent-light: #e8f2eb;
  --accent-mid: #2d6a4f;
  --green: #2d6a4f;
  --amber: #b45309;
  --amber-bg: #fef3c7;
  --blue: #1e4d8c;
  --blue-bg: #dbeafe;
  --red: #991b1b;
  --red-bg: #fee2e2;
  --mono: 'Courier New', monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── HEADER ── */
.header {
  background: var(--accent);
  color: #fff;
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header-icon { font-size: 22px; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 10px; opacity: 0.6; margin-top: 1px; }
.header-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
}

/* ── MAIN LAYOUT ── */
.main {
  padding-top: 70px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ── SEARCH BAR ── */
.search-wrap {
  padding: 12px 16px 8px;
  background: var(--bg);
  position: sticky;
  top: 70px;
  z-index: 50;
}
.search-inner {
  position: relative;
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.search-icon {
  padding: 0 12px;
  color: var(--text3);
  font-size: 16px;
  flex-shrink: 0;
}
.search-input {
  flex: 1;
  height: 44px;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  background: transparent;
  color: var(--text);
}
.search-input::placeholder { color: var(--text3); }
.search-clear {
  width: 36px;
  height: 36px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
  margin-right: 4px;
  border-radius: 50%;
}
.search-clear.show { display: flex; }
.search-count {
  font-size: 11px;
  color: var(--text3);
  padding: 4px 4px 0;
}

/* ── CUSTOMER LIST ── */
.list-wrap {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 80px;
}
.cust-item {
  background: var(--surface);
  margin: 0 12px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  -webkit-user-select: none;
  user-select: none;
}
.cust-item:active { transform: scale(0.98); background: var(--surface2); }
.cust-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent-mid);
  flex-shrink: 0;
}
.cust-avatar.new { background: var(--blue-bg); color: var(--blue); }
.cust-info { flex: 1; min-width: 0; }
.cust-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cust-meta {
  font-size: 11px;
  color: var(--text2);
  margin-top: 3px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}
.badge {
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-region { background: var(--surface2); color: var(--text2); }
.badge-new { background: var(--blue-bg); color: var(--blue); }
.badge-price { background: var(--accent-light); color: var(--accent-mid); }
.badge-change { background: var(--amber-bg); color: var(--amber); }
.cust-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }

/* ── DETAIL PANEL (slide-up) ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.show { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  z-index: 300;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  max-height: 90vh;
  box-shadow: var(--shadow-lg);
}
.detail-panel.show { transform: translateY(0); }

.panel-handle {
  display: flex;
  justify-content: center;
  padding: 12px 0 4px;
  cursor: pointer;
}
.panel-handle-bar {
  width: 36px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
}

.panel-header {
  padding: 4px 18px 0;
  border-bottom: 1px solid var(--border);
}
.panel-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.panel-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}

/* ── TABS ── */
.tabs {
  display: flex;
  margin-top: 12px;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 9px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn.active {
  color: var(--accent-mid);
  border-bottom-color: var(--accent-mid);
  font-weight: 700;
}

/* ── PANEL CONTENT ── */
.panel-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 18px 40px;
}

/* ── COPY SECTION ── */
.copy-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 16px;
}
.copy-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.copy-label { font-size: 12px; font-weight: 600; color: var(--text2); }
.copy-buttons { display: flex; gap: 8px; }
.btn-copy {
  padding: 6px 14px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
  -webkit-user-select: none;
  user-select: none;
}
.btn-copy:active { transform: scale(0.96); }
.btn-copy.ok { background: var(--accent-light); color: var(--green); border-color: var(--green); }
.btn-copy.blue { background: var(--blue-bg); color: var(--blue); border-color: transparent; }
.copy-preview {
  font-size: 11px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  font-family: var(--mono);
  max-height: 140px;
  overflow-y: auto;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  -webkit-overflow-scrolling: touch;
}

/* ── INFO CARDS ── */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 0;
}
.info-card {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  border: 1px solid var(--border);
}
.info-card.full { grid-column: span 2; }
.info-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
.info-value { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-all; }

/* ── PRICE TABLE ── */
.filter-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.filter-input {
  flex: 1;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.filter-count { font-size: 11px; color: var(--text3); white-space: nowrap; }

.price-table-wrap {
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.price-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.price-table th {
  padding: 9px 10px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.price-table th.r { text-align: right; }
.price-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.price-table tr:last-child td { border-bottom: none; }
.price-table tr:nth-child(even) td { background: #fafbfa; }
.price-table td.price { text-align: right; font-weight: 700; color: var(--green); }
.price-table td.r { text-align: right; }
.chg-up { color: var(--amber); font-size: 10px; white-space: nowrap; font-weight: 700; }
.chg-dn { color: var(--blue); font-size: 10px; white-space: nowrap; font-weight: 700; }
.chg-eq { color: var(--text3); font-size: 10px; }
.badge-new-yr {
  background: var(--accent-light);
  color: var(--green);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 600;
}
.price-note {
  font-size: 10px;
  color: var(--text3);
  margin-top: 8px;
  padding: 0 2px;
}
.no-data {
  text-align: center;
  padding: 36px 20px;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.8;
}
.no-data-icon { font-size: 32px; margin-bottom: 10px; }

/* ── TRANSPORT ── */
.transport-form { display: flex; flex-direction: column; gap: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-field label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.form-field select,
.form-field input[type=number] {
  width: 100%;
  height: 42px;
  padding: 0 10px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.result-cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin-top: 4px;
}
.rcard {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.rcard.hi { background: var(--accent-light); border-color: #9fcfb4; }
.rcard-label { font-size: 9px; color: var(--text2); margin-bottom: 4px; }
.rcard-val { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
.rcard.hi .rcard-val { color: var(--green); }
.rcard-unit { font-size: 9px; color: var(--text3); margin-top: 2px; }

/* ── MOBILE RESPONSIVE ── */
@media (min-width: 600px) {
  .main { max-width: 480px; margin: 0 auto; }
  .header { max-width: 480px; left: 50%; transform: translateX(-50%); }
  .overlay { display: block; }
  .detail-panel { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .detail-panel.show { transform: translateX(-50%) translateY(0); }
}

/* ── LOADING / EMPTY ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
</style>

  const checks = [c.상호, c.대리점];
  for (const nm of checks) {
    if (!nm) continue;
    const nl = nm.toLowerCase().replace(/\s/g,'');
    for (const k of Object.keys(PRICES)) {
      const kl = k.toLowerCase().replace(/\s/g,'');
      if (kl === nl || nl.includes(kl) || kl.includes(nl.slice(0,4))) return k;
    }
  }
  return null;
}

function hasChanged(items) {
  return items.some(x => '2025' in x.p && '2026' in x.p && x.p['2025'] !== x.p['2026']);
}

function getInitials(name) {
  return name.replace(/\(.*?\)/g,'').trim().slice(0,2);
}

// ─────── FILTER ───────
function doFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('clearBtn').classList.toggle('show', q.length > 0);
  filteredList = q
    ? CUSTS.filter(c =>
        (c.대리점||'').toLowerCase().includes(q) ||
        (c.상호||'').toLowerCase().includes(q) ||
        (c.대표자||'').toLowerCase().includes(q) ||
        (c.지역||'').includes(q))
    : [...CUSTS];
  document.getElementById('searchCount').textContent = filteredList.length + '개 거래처';
  document.getElementById('headerBadge').textContent = filteredList.length + '개';
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doFilter();
}

// ─────── LIST RENDER ───────
function renderList() {
  const wrap = document.getElementById('listWrap');
  if (!filteredList.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div>검색 결과가 없습니다</div></div>`;
    return;
  }
  wrap.innerHTML = filteredList.map((c, i) => {
    const k = getPriceKey(c);
    const items = k ? PRICES[k] : [];
    const changed = items.length > 0 && hasChanged(items);
    return `<div class="cust-item" onclick="openDetail(${i})">
      <div class="cust-avatar${c.isNew?' new':''}">${getInitials(c.대리점)}</div>
      <div class="cust-info">
        <div class="cust-name">${c.대리점}</div>
        <div class="cust-meta">
          <span class="badge badge-region">${c.지역}</span>
          ${c.isNew ? '<span class="badge badge-new">신규</span>' : ''}
          ${items.length ? `<span class="badge badge-price">${items.length}품목</span>` : ''}
          ${changed ? '<span class="badge badge-change">단가변동</span>' : ''}
          <span>${c.대표자 ? c.대표자.split('\n')[0] : ''}</span>
        </div>
      </div>
      <div class="cust-arrow">›</div>
    </div>`;
  }).join('');
}

// ─────── DETAIL PANEL ───────
function openDetail(i) {
  selCust = filteredList[i];
  curTab = 'info';
  priceFilter = '';
  renderPanel();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('detailPanel').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('detailPanel').classList.remove('show');
  document.body.style.overflow = '';
  selCust = null;
}

function setTab(t) { curTab = t; renderPanelBody(); }

function renderPanel() {
  const c = selCust;
  const k = getPriceKey(c);
  const items = k ? PRICES[k] : [];
  const changed = items.length > 0 && hasChanged(items);

  document.getElementById('panelHeader').innerHTML = `
    <div class="panel-name">
      ${c.대리점}
      ${c.isNew ? '<span class="badge badge-new">신규</span>' : ''}
      ${changed ? '<span class="badge badge-change">단가변동</span>' : ''}
    </div>
    <div class="panel-sub">
      <span class="badge badge-region">${c.지역}</span>
      ${c.상호 && c.상호 !== c.대리점 ? `<span>${c.상호}</span>` : ''}
      ${items.length ? `<span style="color:var(--accent-mid);font-weight:600">${items.length}개 품목</span>` : ''}
    </div>
    <div class="tabs">
      <button class="tab-btn${curTab==='info'?' active':''}" onclick="setTab('info')">📋 기본정보</button>
      <button class="tab-btn${curTab==='price'?' active':''}" onclick="setTab('price')">💰 품목·단가</button>
      <button class="tab-btn${curTab==='transport'?' active':''}" onclick="setTab('transport')">🚛 운송비</button>
    </div>`;

  renderPanelBody();
}

function renderPanelBody() {
  // re-render tabs active state
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['info','price','transport'];
    btn.classList.toggle('active', tabs[i] === curTab);
  });
  const body = document.getElementById('panelBody');
  if (curTab === 'info') body.innerHTML = renderInfo();
  else if (curTab === 'price') body.innerHTML = renderPrice();
  else body.innerHTML = renderTransport();
}

// ─────── COPY TEXT ───────
function buildCopyText(limit) {
  const c = selCust;
  const k = getPriceKey(c);
  const items = k ? PRICES[k].filter(x => Object.values(x.p).some(v => v > 0)) : [];
  let t = '[거래처 정보]\n';
  t += `거래처  : ${c.대리점}${c.상호 && c.상호 !== c.대리점 ? ' (' + c.상호 + ')' : ''}\n`;
  t += `대표자  : ${c.대표자 || '—'}\n`;
  t += `전화    : ${c.전화번호 || '—'}\n`;
  t += `주소    : ${c.주소 || '—'}\n`;
  if (items.length) {
    t += '\n[품목별 단가]\n';
    t += '─────────────────────\n';
    const list = limit ? items.slice(0, limit) : items;
    list.forEach(x => {
      const yrs = Object.keys(x.p).sort();
      t += `${x.n} (${x.s})\n`;
      if (yrs.length > 1) {
        yrs.forEach(y => { t += `  ${y}년: ${x.p[y].toLocaleString()}원\n`; });
      } else {
        t += `  ${yrs[0]}년: ${x.p[yrs[0]].toLocaleString()}원\n`;
      }
    });
    if (limit && items.length > limit) t += `  (외 ${items.length - limit}개 품목)\n`;
  }
  return t;
}

function doCopy(full, btnId) {
  const txt = buildCopyText(full ? 0 : 5);
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(txt).then(() => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ 복사됨';
      btn.classList.add('ok');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
    }
  });
}

function renderCopyBox() {
  const k = getPriceKey(selCust);
  const items = k ? PRICES[k].filter(x => Object.values(x.p).some(v => v > 0)) : [];
  const preview = buildCopyText(5);
  return `<div class="copy-box">
    <div class="copy-header">
      <span class="copy-label">📤 복사 → 카카오톡 / 문자 전송</span>
      <div class="copy-buttons">
        ${items.length > 5 ? `<button class="btn-copy blue" id="btnAll" onclick="doCopy(true,'btnAll')">전체 ${items.length}개</button>` : ''}
        <button class="btn-copy" id="btnMain" onclick="doCopy(false,'btnMain')">${items.length > 5 ? '상위 5개' : '복사하기'}</button>
      </div>
    </div>
    <div class="copy-preview">${preview}</div>
  </div>`;
}

// ─────── INFO TAB ───────
function renderInfo() {
  const c = selCust;
  return `${renderCopyBox()}
    <div class="info-grid">
      ${c.주소 ? `<div class="info-card full"><div class="info-label">📍 주소</div><div class="info-value">${c.주소}</div></div>` : ''}
      <div class="info-card"><div class="info-label">👤 대표자</div><div class="info-value">${c.대표자 || '—'}</div></div>
      <div class="info-card"><div class="info-label">📞 전화번호</div><div class="info-value">${c.전화번호 || '—'}</div></div>
      <div class="info-card"><div class="info-label">🏢 상호</div><div class="info-value">${c.상호 || '—'}</div></div>
      <div class="info-card"><div class="info-label">🗺 지역</div><div class="info-value">${c.지역}</div></div>
    </div>`;
}

// ─────── PRICE TAB ───────
function renderPrice() {
  const c = selCust;
  const k = getPriceKey(c);
  if (!k || !PRICES[k] || !PRICES[k].length) {
    return `${renderCopyBox()}
      <div class="no-data">
        <div class="no-data-icon">📭</div>
        이 거래처의 단가 데이터가 없습니다.<br>
        추가 연도 xls 파일을 업로드하거나<br>
        아마란스10 API 연동 후 확인 가능합니다.
      </div>`;
  }
  const items = PRICES[k].filter(x => Object.values(x.p).some(v => v > 0));
  const q = priceFilter.toLowerCase();
  const shown = q ? items.filter(x => x.n.toLowerCase().includes(q)) : items;

  return `${renderCopyBox()}
    <div class="filter-bar">
      <input type="text" class="filter-input" value="${priceFilter}"
        placeholder="품목명 검색..."
        oninput="priceFilter=this.value;renderPanelBody()" autocomplete="off">
      <span class="filter-count">${shown.length}/${items.length}</span>
    </div>
    <div class="price-table-wrap">
      <table class="price-table">
        <thead>
          <tr>
            <th>품목명</th>
            <th class="r">2025년</th>
            <th class="r">2026년</th>
            <th class="r">변동</th>
          </tr>
        </thead>
        <tbody>
          ${shown.map(x => {
            const p25 = x.p['2025'] || null;
            const p26 = x.p['2026'] || null;
            let chg = '<span class="chg-eq">—</span>';
            if (p25 && p26) {
              const d = p26 - p25;
              const pct = Math.round(d / p25 * 100);
              if (d > 0) chg = `<span class="chg-up">▲${pct}%</span>`;
              else if (d < 0) chg = `<span class="chg-dn">▼${Math.abs(pct)}%</span>`;
              else chg = '<span class="chg-eq">유지</span>';
            } else if (p26 && !p25) {
              chg = '<span class="badge-new-yr">신규</span>';
            }
            return `<tr>
              <td><div style="font-weight:600;font-size:12px">${x.n}</div><div style="font-size:10px;color:var(--text3)">${x.s}</div></td>
              <td class="r">${p25 ? p25.toLocaleString() : '<span style="color:var(--text3)">—</span>'}</td>
              <td class="price">${p26 ? p26.toLocaleString() : '<span style="color:var(--text3);font-weight:400">—</span>'}</td>
              <td class="r">${chg}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="price-note">※ 2025~2026 아마란스 출고현황 실제 단가 · (임) 배차 단가 제외</div>`;
}

// ─────── TRANSPORT TAB ───────
function renderTransport() {
  const deps = Object.keys(TRANSPORT);
  return `<div class="transport-form">
    <div class="form-row">
      <div class="form-field"><label>출발지</label>
        <select id="td" onchange="onTDep()"><option value="">선택</option>${deps.map(d=>`<option>${d}</option>`).join('')}</select>
      </div>
      <div class="form-field"><label>도착지</label>
        <select id="tde" onchange="onTDest()"><option value="">선택</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>차량 톤수</label>
        <select id="tt" onchange="calcT()"><option value="">선택</option></select>
      </div>
      <div class="form-field"><label>제품 종류</label>
        <select id="tp" onchange="calcT()"><option value="">선택(포당단가)</option></select>
      </div>
    </div>
    <div class="form-field"><label>포수</label>
      <input type="number" id="tb" placeholder="예: 1200" oninput="calcT()" min="1">
    </div>
    <div id="tresult"></div>
  </div>`;
}

function onTDep() {
  const dep = document.getElementById('td')?.value;
  const ds = document.getElementById('tde'); if (!ds) return;
  ds.innerHTML = '<option value="">선택</option>' + (dep && TRANSPORT[dep] ? Object.keys(TRANSPORT[dep]).map(d=>`<option>${d}</option>`).join('') : '');
  ['tt','tp'].forEach(id => {
    const e = document.getElementById(id);
    if (e) e.innerHTML = id==='tt' ? '<option value="">선택</option>' : '<option value="">선택(포당단가)</option>';
  });
  const r = document.getElementById('tresult'); if (r) r.innerHTML = '';
}

function onTDest() {
  const dep = document.getElementById('td')?.value;
  const dest = document.getElementById('tde')?.value;
  const ts = document.getElementById('tt'); const ps = document.getElementById('tp');
  if (!ts || !dep || !dest || !TRANSPORT[dep]?.[dest]) return;
  const row = TRANSPORT[dep][dest];
  const ks = Object.keys(row);
  const tons = ks.filter(k => k.includes('톤') && !k.includes('포'));
  const prods = ks.filter(k => !tons.includes(k));
  ts.innerHTML = '<option value="">선택</option>' + tons.map(k=>`<option>${k}</option>`).join('');
  ps.innerHTML = '<option value="">선택(포당단가)</option>' + prods.map(k=>`<option>${k}</option>`).join('');
  calcT();
}

function calcT() {
  const dep = document.getElementById('td')?.value;
  const dest = document.getElementById('tde')?.value;
  const ton = document.getElementById('tt')?.value;
  const prod = document.getElementById('tp')?.value;
  const bags = parseInt(document.getElementById('tb')?.value) || 0;
  const el = document.getElementById('tresult'); if (!el) return;
  if (!dep || !dest || !TRANSPORT[dep]?.[dest]) { el.innerHTML = ''; return; }
  const row = TRANSPORT[dep][dest];
  const tc = ton ? row[ton] : null;
  const pb = prod ? row[prod] : null;
  let h = '<div class="result-cards">';
  if (tc) h += `<div class="rcard hi"><div class="rcard-label">${ton}</div><div class="rcard-val">${Math.round(tc).toLocaleString()}</div><div class="rcard-unit">원</div></div>`;
  if (pb) h += `<div class="rcard hi"><div class="rcard-label">포당 단가</div><div class="rcard-val">${Math.round(pb).toLocaleString()}</div><div class="rcard-unit">원/포</div></div>`;
  if (bags > 0 && pb) h += `<div class="rcard hi"><div class="rcard-label">총 운송비</div><div class="rcard-val">${Math.round(bags*pb).toLocaleString()}</div><div class="rcard-unit">원 (${bags.toLocaleString()}포)</div></div>`;
  else if (bags > 0 && tc) h += `<div class="rcard"><div class="rcard-label">포당 환산</div><div class="rcard-val">${Math.round(tc/bags).toLocaleString()}</div><div class="rcard-unit">원/포</div></div>`;
  h += '</div>';
  el.innerHTML = (tc || pb) ? h : '';
}

// touch swipe to close
let touchStartY = 0;
document.getElementById('detailPanel').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('detailPanel').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 80) closePanel();
}, {passive:true});

// init
renderList();
</script>
</body>
</html>
